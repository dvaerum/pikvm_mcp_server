# Minimal tinyproxy config for the PiKVM MCP loopback-proxy workaround.
#
# Bound to loopback so only local processes (the MCP server) can use it.
# No ConnectPort directives  => CONNECT tunnelling to ANY port is permitted
# (no limitation on what it will connect to, as requested).
#
# Run it in a GRANTED Terminal.app window (not tmux) so its outbound LAN
# connections inherit Terminal's macOS Local Network grant:
#
#   nix run nixpkgs#tinyproxy -- -d -c docs/service/tinyproxy.conf
#
# The first time it connects to the PiKVM, macOS prompts
# "Terminal wants to find devices on your local network" -> Allow.

Port 8888
Listen 127.0.0.1
Allow 127.0.0.1
Timeout 600
LogLevel Info
MaxClients 50
